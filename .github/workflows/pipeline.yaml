name: CI Pipeline

# this is a trigger event meaning what event should trigger the pipeline
on:
  push:
    branches: [main]

jobs:
  # build is the job
  build:
    runs-on: ubuntu-latest

    # inside a job you define different steps
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16

      - name: Install dependencies
        run: npm install